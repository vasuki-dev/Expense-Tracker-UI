<div class="min-h-screen bg-[url('/login.png')] bg-cover bg-center">

    <!-- Overlay -->
    <div class="min-h-screen bg-black/20">

        <div class="min-h-screen flex items-center justify-center lg:justify-end px-4 sm:px-8 lg:px-10">

            <div
                class="w-full max-w-md lg:max-w-xl
                       bg-white/95 backdrop-blur-sm
                       shadow-2xl rounded-3xl
                       p-6 sm:p-8 lg:p-12">

                <!-- Logo -->

                <div class="flex justify-center mb-6">

                    <img src="CashQuery.png"
                         class="w-28 sm:w-36 lg:w-40">

                </div>

                <!-- Heading -->

                <div class="text-center mb-8">

                    <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">

                        Welcome Back 👋

                    </h1>

                    <p class="text-slate-500 mt-2">

                        Login to your CashQuery account

                    </p>

                </div>

                <!-- Username -->

                <div class="mb-5">

                    <label class="block mb-2 text-sm sm:text-base font-semibold text-slate-700">

                        Username

                    </label>

                    <input
                        type="text"
                        [value]="username()"
                        (input)="username.set($event.target.value)"
                        [class.border-red-500]="usernameError()"
                        class="w-full rounded-xl border border-slate-300
                               bg-slate-50
                               px-4 py-3
                               focus:bg-white
                               focus:ring-4
                               focus:ring-teal-100
                               focus:border-teal-500
                               transition">

                    @if(usernameError()){

                    <p class="text-red-500 text-sm mt-2">

                        {{usernameError()}}

                    </p>

                    }

                </div>

                <!-- Password -->

                <div class="mb-6">

                    <label class="block mb-2 text-sm sm:text-base font-semibold text-slate-700">

                        Password

                    </label>

                    <input
                        type="password"
                        [value]="password()"
                        (input)="password.set($event.target.value)"
                        [class.border-red-500]="passwordError()"
                        class="w-full rounded-xl border border-slate-300
                               bg-slate-50
                               px-4 py-3
                               focus:bg-white
                               focus:ring-4
                               focus:ring-teal-100
                               focus:border-teal-500
                               transition">

                    @if(passwordError()){

                    <p class="text-red-500 text-sm mt-2">

                        {{passwordError()}}

                    </p>

                    }

                </div>

                <!-- Forgot Password -->

                <div class="flex justify-end mb-6">

                    <a
                        routerLink="/forgot-password"
                        class="text-sm text-teal-600 hover:underline">

                        Forgot Password?

                    </a>

                </div>

                <!-- Login -->

                <button
                    (click)="login()"
                    class="w-full rounded-xl
                           py-3
                           bg-gradient-to-r
                           from-teal-600
                           to-cyan-600
                           text-white
                           font-semibold
                           shadow-lg
                           hover:shadow-xl
                           hover:scale-[1.02]
                           active:scale-95
                           transition">

                    Login

                </button>

                <!-- Signup -->

                <div class="mt-8 text-center">

                    <span class="text-slate-600">

                        Don't have an account?

                    </span>

                    <a
                        routerLink="/signup"
                        class="ml-1 font-semibold text-teal-600 hover:underline">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
