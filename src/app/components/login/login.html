<!-- <img src="login.png" class="bglogin" /> -->
<div class="min-h-screen bg-[url('/login.png')] bg-cover bg-center flex justify-end items-center p-10">
    <div class="bg-white shadow-2xl rounded-2xl m-10 p-18 w-full max-w-xl">
        <div class="flex justify-center">
            <img src="CashQuery.png" width="150px">
        </div>
        <div class="space-y-6">

            <!-- Username -->
            <div class="space-y-2">
                <label class="text-lg font-medium text-gray-700">
                    Username hey
                </label>
                <input type="text" [value]="username()" (input)="username.set($event.target.value)"
                    [class.border-red-500]="usernameError()"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-200" />
                @if(usernameError()){
                <p class="text-red-500 text-sm">
                    {{ usernameError() }}
                </p>
                }
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-lg font-medium text-gray-700">
                    Password
                </label>
                <input type="password" [value]="password()" (input)="password.set($event.target.value)"
                    [class.border-red-500]="passwordError()"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-200" />
                @if(passwordError()){
                <span class="text-red-500 text-sm">
                    {{ passwordError() }}
                </span>
                }
            </div>

        </div>
        <div class="flex justify-center pt-10">
            <button class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold 
         hover:bg-green-700 active:scale-95 
         transition duration-200" (click)="login()">
                Login
            </button>
        </div>
    </div>
</div>
