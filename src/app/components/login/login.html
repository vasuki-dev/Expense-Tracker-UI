<div class="min-h-screen bg-[url('/login.png')] bg-cover bg-center flex justify-end items-center p-10">

        <div class="flex justify-center">
            <img src="CashQuery.png" width="120px">
        </div>
        <div class="space-y-6">

            <!-- Username -->
            <div class="space-y-2">
                <label class="text-lg font-medium text-gray-700">
                    Username
                </label>
                <input type="text"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-200" />
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-lg font-medium text-gray-700">

            </div>

        </div>
        <div class="flex justify-center pt-10">
