<div class="sticky top-0 z-50
            flex items-center justify-between
            bg-white border-b
            px-4 sm:px-6
            py-3 sm:py-4">
    <!-- Logo -->
    <div class="flex items-center gap-2 sm:gap-3 cursor-pointer group" (click)="goDash()">
        <div class="w-8 h-8 sm:w-9 sm:h-9
            rounded-xl
            bg-gradient-to-r
            from-teal-600
            to-cyan-600
            text-white
            flex items-center
            justify-center
            text-xl sm:text-xl sm:text-2xl
            font-bold"> E
        </div>
        <h1 class="text-base sm:text-xl lg:text-xl sm:text-2xl font-semibold text-gray-800">
            Expense<span class="text-teal-600">Tracker</span>
        </h1>
    </div>

    <!-- Right side -->
    <div class="flex items-center gap-2 sm:gap-4 lg:gap-6">
        <!-- <p class="text-gray-700 font-medium hidden sm:block">
            Hi, <span class="font-semibold text-teal-700">{{userdetails?.userName}}</span>!
        </p> -->

        <!-- Notifications -->
        <button type="button"
            class="relative
       p-2
       transition text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-colors focus:outline-2 focus:outline-offset-2 focus:outline-teal-500">
            <span class="sr-only">View notifications</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-9-5.197V8.5m.002 3.5L12 15l-3-3" />
            </svg>
            <!-- Notification badge -->
            <!-- <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white"></span> -->
        </button>
        <div class="relative">

            <button (click)="toggleProfileMenu()" class="flex items-center
       gap-2
       rounded-xl
       px-2 sm:px-3
       py-2
       hover:bg-slate-100 transition">

                <div class="w-9 h-9
sm:w-10 sm:h-10
rounded-full
bg-gradient-to-r
from-teal-600
to-cyan-600
text-white
font-semibold
flex
items-center
justify-center">

                    {{userdetails?.userName?.charAt(0).toUpperCase()}}

                </div>

                <div class="hidden lg:block text-left">

                    <p class="text-sm font-semibold text-slate-800">

                        {{userdetails?.userName}}

                    </p>

                    <!-- <p class="text-xs text-slate-500">

                        Employee

                    </p> -->

                </div>

                <i class="fa-solid fa-chevron-down text-xs text-slate-500"></i>

            </button>

            @if(showProfileMenu){
 <div
            class="fixed inset-0 z-40"
            (click)="closeProfileMenu()">
        </div>

            <div class="absolute right-0 mt-3 w-72
max-w-[calc(100vw-20px)] bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden z-50">

                <!-- Header -->

                <div class="px-5 py-4 bg-slate-50">

                    <div class="flex gap-3">

                        <div
                            class="w-12 h-12 rounded-full bg-gradient-to-r from-teal-600 to-cyan-600 text-white flex items-center justify-center text-base sm:text-lg font-bold">

                            {{userdetails?.userName?.charAt(0).toUpperCase()}}

                        </div>

                        <div class="flex"  style="align-items: center !important;">

                            <p class="font-semibold">

                                {{userdetails?.userName}}

                            </p>

                            <p class="text-sm text-slate-500">

                                {{userdetails?.email}}

                            </p>

                        </div>

                    </div>

                </div>

                <!-- Menu -->

                <button (click)="openProfile()"
                    class="w-full flex items-center gap-3 px-5 py-3 hover:bg-slate-100 transition">

                    <i class="fa-solid fa-user text-teal-600"></i>

                    My Profile

                </button>

                <button (click)="openPassword()"
                    class="w-full flex items-center gap-3 px-5 py-3 hover:bg-slate-100 transition">

                    <i class="fa-solid fa-key text-amber-600"></i>

                    Change Password

                </button>

                <hr>

                <button (click)="confirmLogout()"
                    class="w-full flex items-center gap-3 px-5 py-3 hover:bg-red-50 text-red-600 transition">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </button>

            </div>

            }

        </div>
    </div>
</div>

@if(showLogoutDialog){

<div class="fixed inset-0 z-50
           flex items-center justify-center
           bg-black/40 backdrop-blur-sm">

    <div class="bg-white rounded-2xl shadow-2xl
               w-[92%]
sm:w-[420px] overflow-hidden animate-[fadeIn_.2s_ease]">

        <!-- Header -->

        <div class="px-6 py-5 border-b">

            <div class="flex items-center gap-4">

                <div class="w-14 h-14 rounded-full
                           bg-red-100
                           flex items-center justify-center">

                    <i class="fa-solid fa-right-from-bracket text-red-600 text-xl sm:text-2xl"></i>

                </div>

                <div>

                    <h2 class="text-xl font-bold text-slate-800">

                        Logout

                    </h2>

                    <p class="text-sm text-slate-500 mt-1">

                        Are you sure you want to logout?

                    </p>

                </div>

            </div>

        </div>

        <!-- Footer -->

        <div class="flex flex-col-reverse
sm:flex-row
justify-end gap-3 px-6 py-5">

            <button (click)="cancelLogout()" class="px-5 py-2.5 rounded-xl
                       border border-slate-300
                       hover:bg-slate-100
                       transition">

                Cancel

            </button>

            <button (click)="logout()" class="px-5 py-2.5 rounded-xl
                       bg-red-600 text-white
                       hover:bg-red-700
                       shadow-lg
                       transition">

                Logout

            </button>

        </div>

    </div>

</div>

}
@if(showChangePassword){

<div class="fixed inset-0 bg-black/40 z-50">

    <div class="absolute right-0 top-0 h-full w-full
sm:w-[420px]
md:w-[450px] bg-white shadow-2xl">

        <div class="flex justify-between items-center p-6 border-b">

            <h2 class="text-xl sm:text-2xl font-bold">

                Change Password

            </h2>

            <button class="w-10 h-10
rounded-full
hover:bg-slate-100
transition" (click)="closePassword()">

                <i class="fa-solid fa-xmark text-xl"></i>

            </button>

        </div>

        <div class="p-6 space-y-5">

            <div>

                <label>Current Password</label>

                <input type="password" class="w-full mt-2 border rounded-xl p-3">

            </div>

            <div>

                <label>New Password</label>

                <input type="password" class="w-full mt-2 border rounded-xl p-3">

            </div>

            <div>

                <label>Confirm Password</label>

                <input type="password" class="w-full mt-2 border rounded-xl p-3">

            </div>

        </div>

        <div class="sticky bottom-0 bg-white border-t p-5">

            <button class="w-full rounded-xl py-3 bg-gradient-to-r from-teal-600 to-cyan-600 text-white">

                Update Password

            </button>

        </div>

    </div>

</div>

}
