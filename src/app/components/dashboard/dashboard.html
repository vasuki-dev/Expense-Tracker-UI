<!-- Main Container -->
<!-- <div class="w-full max-w-6xl bg-white rounded-xl shadow-lg">-->
<div class="grid grid-cols-12 gap-4">
    
    <div class="col-span-8 p-4">

        <!-- Dashboard Content -->
        <div class="p-8 bg-gray-50">

            <h2 class="text-3xl font-semibold text-gray-700 mb-6">
                Dashboard
            </h2>

            <!-- Welcome Card -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h3 class="text-xl font-semibold text-gray-700">
                    Hello, Sri Ganesh Stores 👋
                </h3>
            </div>

            <!-- Expense Cards -->
            <div class="grid grid-cols-2 gap-6 mb-6">

                <!-- Today Expense -->
                <div class="flex items-center gap-4 bg-blue-50 p-6 rounded-lg shadow hover:shadow-md transition">

                    <div
                        class="bg-blue-200 text-blue-800 text-2xl w-14 h-14 flex items-center justify-center rounded-lg">
                        ₹
                    </div>

                    <div>
                        <p class="text-gray-600">Today's Expense</p>
                        <h3 class="text-2xl font-bold text-gray-800">₹ 1,200</h3>
                    </div>

                </div>

                <!-- Monthly Expense -->
                <div class="flex items-center gap-4 bg-blue-50 p-6 rounded-lg shadow hover:shadow-md transition">

                    <div
                        class="bg-blue-200 text-blue-800 text-2xl w-11 h-11 flex items-center justify-center rounded-lg expenseMonth ">
                        <select class="w-full px-4 py-2 border border-gray-300 rounded-lg 
         bg-white focus:outline-none focus:ring-2 focus:ring-gray-500" (change)="monthChange($event)">

                            <option value="">Select Month</option>
                            <option value="1">Jan</option>
                            <option value="2">Feb</option>
                            <option value="3">Mar</option>
                            <option value="4">Apr</option>

                        </select>
                    </div>

                    <div>
                        <p class="text-gray-600">This Month's Total</p>
                        <h3 class="text-2xl font-bold text-gray-800">₹ 28,450</h3>
                    </div>

                </div>

            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-2 gap-6 bg-white p-6 rounded-lg shadow">

                <button
                    class="flex items-center justify-center gap-3 bg-teal-600 text-white text-lg font-semibold py-4 rounded-lg hover:bg-teal-700 transition"
                    (click)="openAdd()">

                    ➕ Add Expense
                </button>

                <button
                    class="flex items-center justify-center gap-3 bg-gray-200 text-gray-700 text-lg font-semibold py-4 rounded-lg hover:bg-gray-300 transition"
                    (click)="viewExpenses()">
                    🔍 View Expenses
                </button>

            </div>

        </div>
        <!-- <app-expense-list *ngIf="showList" [expenses]="expenses">
        </app-expense-list> -->

        <app-expense-form *ngIf="openForm" [editData]="editData" (close)="closeForm()">
        </app-expense-form>
    </div>

    <div class="col-span-4 p-4">
          <div class="flex justify-center">
            <img src="expenseTracker.jpg" width="150px" class="img">
        </div>
    </div>

</div>
